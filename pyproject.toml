[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.radon]
exclude = "venv/*,.git/*"

[tool.pytest.ini_options]
pythonpath = ["src/restreamer", "src"]
