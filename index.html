<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- HLS.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Player Wrapper Container */
        .player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        /* Pulsing LIVE Badge overlay */
        .live-badge {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.875rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            z-index: 20;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .live-badge.visible {
            opacity: 1;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Custom Live Control Overlay */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0) 100%);
            padding: 2.5rem 1.5rem 1.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            z-index: 20;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Show controls on hover */
        .player-wrapper:hover .controls-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.25rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            transition: background 0.2s, transform 0.1s;
            outline: none;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .stream-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
            user-select: none;
        }

        /* Offline state overlay */
        .offline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            text-align: center;
            padding: 2rem;
            color: #fff;
        }

        .offline-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .offline-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .offline-desc {
            color: #9ca3af;
            font-size: 0.9rem;
            max-width: 320px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="player-wrapper" id="wrapper">
        <!-- Offline Screen -->
        <div class="offline-overlay" id="offline-screen">
            <div class="offline-icon">📺</div>
            <div class="offline-title">Stream Offline</div>
            <div class="offline-desc">The live broadcast is currently offline. Playing will start automatically when the feed is active.</div>
        </div>

        <!-- Live Badge -->
        <div class="live-badge" id="live-badge">
            <span class="live-dot"></span>
            LIVE
        </div>

        <video id="player" autoplay muted playsinline></video>

        <!-- Custom Controls Overlay -->
        <div class="controls-overlay" id="controls-bar">
            <!-- Play/Pause -->
            <button class="control-btn" id="btn-play" onclick="togglePlay()" title="Play/Pause">⏸</button>
            <!-- Mute/Unmute -->
            <button class="control-btn" id="btn-mute" onclick="toggleMute()" title="Mute/Unmute">🔇</button>
            <!-- Info Text -->
            <span class="stream-info" id="status-info">Connecting to broadcast...</span>
            <!-- Fullscreen -->
            <button class="control-btn" id="btn-fs" onclick="toggleFullscreen()" style="margin-left: auto;" title="Fullscreen">⛶</button>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const video = document.getElementById('player');
        const offlineScreen = document.getElementById('offline-screen');
        const liveBadge = document.getElementById('live-badge');
        const controlsBar = document.getElementById('controls-bar');
        const btnPlay = document.getElementById('btn-play');
        const btnMute = document.getElementById('btn-mute');
        const statusInfo = document.getElementById('status-info');
        
        const streamUrl = '/media/local.m3u8';
        let hls = null;
        let isStreamActive = false;
        let retryTimer = null;
        let pollTimer = null;
        let controlHideTimer = null;

        // Auto check status
        window.addEventListener('load', () => {
            fetchStatus();
            pollTimer = setInterval(fetchStatus, 3000);
            
            // Auto hide custom controls cursor when inactive
            wrapper.addEventListener('mousemove', showControlsBriefly);
        });

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                if (data.state === "TRANSCODING") {
                    setStreamOnline();
                } else {
                    setStreamOffline();
                }
            } catch (err) {
                setStreamOffline();
            }
        }

        function setStreamOnline() {
            if (isStreamActive) return;
            isStreamActive = true;
            
            offlineScreen.style.display = "none";
            liveBadge.classList.add('visible');
            statusInfo.innerText = "Live Stream Broadcast";
            
            initializeHLS();
        }

        function setStreamOffline() {
            if (!isStreamActive && offlineScreen.style.display !== "none") return;
            isStreamActive = false;
            
            offlineScreen.style.display = "flex";
            liveBadge.classList.remove('visible');
            destroyHLS();
        }

        function initializeHLS() {
            if (hls || video.src) return;

            if (Hls.isSupported()) {
                hls = new Hls({
                    manifestLoadingTimeOut: 10000,
                    manifestLoadingMaxRetry: 5,
                    levelLoadingTimeOut: 10000,
                    levelLoadingMaxRetry: 5
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        // Autoplay blocked, ensure we show play button
                        btnPlay.innerText = "▶";
                    });
                });
                
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.warn("HLS fatal error, rebuilding player...");
                        destroyHLS();
                        retryTimer = setTimeout(initializeHLS, 2000);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {
                        btnPlay.innerText = "▶";
                    });
                });
                video.addEventListener('error', handleNativeError);
            }
        }

        function handleNativeError() {
            destroyHLS();
            retryTimer = setTimeout(initializeHLS, 2000);
        }

        function destroyHLS() {
            if (retryTimer) {
                clearTimeout(retryTimer);
                retryTimer = null;
            }
            video.pause();
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.src = "";
            video.removeEventListener('error', handleNativeError);
            btnPlay.innerText = "⏸";
        }

        // Custom Player Controls Actions
        function togglePlay() {
            if (video.paused) {
                video.play().catch(e => console.log(e));
                btnPlay.innerText = "⏸";
            } else {
                video.pause();
                btnPlay.innerText = "▶";
            }
        }

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                btnMute.innerText = "🔊";
            } else {
                video.muted = true;
                btnMute.innerText = "🔇";
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement &&
                !document.mozFullScreenElement && 
                !document.webkitFullscreenElement && 
                !document.msFullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                } else if (wrapper.mozRequestFullScreen) {
                    wrapper.mozRequestFullScreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // Auto cursor/controls hide when mouse stops moving
        function showControlsBriefly() {
            wrapper.style.cursor = 'default';
            controlsBar.style.opacity = '1';
            controlsBar.style.transform = 'translateY(0)';
            
            if (controlHideTimer) clearTimeout(controlHideTimer);
            
            controlHideTimer = setTimeout(() => {
                if (isStreamActive && !video.paused) {
                    wrapper.style.cursor = 'none';
                    controlsBar.style.opacity = '0';
                    controlsBar.style.transform = 'translateY(10px)';
                }
            }, 3000);
        }
    </script>
</body>
</html>
